name: Overwatch Daily OSINT Bulletin

on:
  schedule:
    # 04:00 UTC = 06:00 SAST every morning
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

jobs:
  bulletin:
    name: Generate and deliver daily bulletin
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic

      - name: Run Overwatch bulletin
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python bulletin.py

      - name: Upload bulletin artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bulletin-${{ github.run_id }}
          path: |
            bulletin_*.json
            bulletin_*.html
          retention-days: 30
